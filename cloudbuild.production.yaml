substitutions:
  _SERVICE: fondeu-platform
  _REGION: europe-west2
  _MIGRATION_JOB: fondeu-db-migrate
  _CLOUD_SQL_INSTANCE: fondeu-db
  _GCS_BUCKET: fondeu-platform-storage
  _GCS_KEY_FILENAME: ""
  _QDRANT_URL: http://10.154.0.3:6333
  _MANAGED_RUNTIME_ENABLED: "true"
  _PRODUCTION_URL: https://fondeu-platform-857599941951.europe-west2.run.app
  _CLOUDSQL_CONNECTION_NAME: eufunding:europe-west2:fondeu-db
  _DB_SOCKET_PATH: /cloudsql/eufunding:europe-west2:fondeu-db
  _DB_NAME: fondeu
  _DB_USER: fondeu
  _VPC_CONNECTOR: fondeu-vpc-connector
  _VPC_EGRESS: private-ranges-only
  _DATABASE_URL_SECRET_NAME: DATABASE_URL
  _NEXTAUTH_SECRET_NAME: NEXTAUTH_SECRET
  _REDIS_URL_SECRET_NAME: REDIS_URL
  _SENTRY_DSN_SECRET_NAME: SENTRY_DSN
  _QDRANT_API_KEY_SECRET_NAME: QDRANT_API_KEY
  _SMTP_PASS_SECRET_NAME: SMTP_PASS
  _DB_PASS_SECRET_NAME: DB_PASS
  _OPENAI_API_KEY_SECRET_NAME: OPENAI_API_KEY
  _ANTHROPIC_API_KEY_SECRET_NAME: ANTHROPIC_API_KEY
  _STRIPE_PUBLISHABLE_SECRET_NAME: STRIPE_PUBLISHABLE_KEY
  _STRIPE_SECRET_KEY_SECRET_NAME: stripe-secret-key
  _STRIPE_WEBHOOK_SECRET_NAME: stripe-webhook-secret
  _GOOGLE_CLIENT_ID_SECRET_NAME: GOOGLE_CLIENT_ID
  _GOOGLE_CLIENT_SECRET_SECRET_NAME: GOOGLE_CLIENT_SECRET
  _PERPLEXITY_API_KEY_SECRET_NAME: PERPLEXITY_API_KEY
  _GOOGLE_AI_API_KEY_SECRET_NAME: GOOGLE_AI_API_KEY
  _HEALTHCHECK_SECRET_NAME: ""
  # Opt-in for shared dev/staging deploys only — leave "false" for true production.
  _ALLOW_PASSWORD_LOGIN: "false"
  # Build-time client bundle flag; keep paired with _ALLOW_PASSWORD_LOGIN when enabling password login.
  _NEXT_PUBLIC_ALLOW_PASSWORD_LOGIN: "false"
  # Comma-separated allowlist. Empty is intentional fail-closed behavior.
  _AUTH_ALLOWED_EMAILS: ""
  # Pinned audience for Cloud Scheduler OIDC tokens hitting /api/v1/admin/discovery/run.
  # Avoids the resolveAudience() forwarded-header inference path drifting if the load
  # balancer reshapes Host/X-Forwarded-Host. Must match the Scheduler job's audience.
  _SCHEDULER_OIDC_AUDIENCE: https://fondeu-platform-6sstqggyaq-nw.a.run.app/api/v1/admin/discovery/run

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: prepare
    entrypoint: bash
    args:
      - -ceu
      - |
        # Cloud Build substitutes $COMMIT_SHA at YAML preprocessing time. Bash's
        # ${VAR:-default} form does NOT see Cloud Build substitutions as bash env
        # vars, so we assign first, then default at the bash level. See PR #86 for
        # the same pattern fix on APP_VERSION/GITHUB_SHA.
        IMAGE_TAG="$COMMIT_SHA"
        IMAGE_TAG="${IMAGE_TAG:-$BUILD_ID}"
        IMAGE_REPO="europe-west2-docker.pkg.dev/$PROJECT_ID/fondeu/app"
        IMAGE_URI="$$IMAGE_REPO:$$IMAGE_TAG"
        echo "IMAGE_TAG=$$IMAGE_TAG" > /workspace/deploy.env
        echo "IMAGE_REPO=$$IMAGE_REPO" >> /workspace/deploy.env
        echo "IMAGE_URI=$$IMAGE_URI" >> /workspace/deploy.env
        echo "Prepared image $$IMAGE_URI"

  - name: gcr.io/cloud-builders/docker
    id: build
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/deploy.env
        docker build \
          -f infrastructure/Dockerfile.prod \
          --build-arg "NEXT_PUBLIC_ALLOW_PASSWORD_LOGIN=$_NEXT_PUBLIC_ALLOW_PASSWORD_LOGIN" \
          -t "$$IMAGE_URI" \
          -t "$$IMAGE_REPO:latest" \
          .

  - name: gcr.io/cloud-builders/docker
    id: push-versioned
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/deploy.env
        docker push "$$IMAGE_URI"

  - name: gcr.io/cloud-builders/docker
    id: push-latest
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/deploy.env
        docker push "$$IMAGE_REPO:latest"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: backup-db
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud sql backups create \
          --instance="$_CLOUD_SQL_INSTANCE" \
          --description="pre-deploy-$COMMIT_SHA" \
          --async

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: configure-migration-job
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/deploy.env
        SERVICE_ACCOUNT="fondeu-app-runner@$PROJECT_ID.iam.gserviceaccount.com"

        if gcloud run jobs describe "$_MIGRATION_JOB" --region "$_REGION" >/dev/null 2>&1; then
          gcloud run jobs update "$_MIGRATION_JOB" \
            --region "$_REGION" \
            --image "$$IMAGE_URI" \
            --service-account "$$SERVICE_ACCOUNT" \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --add-cloudsql-instances "$_CLOUDSQL_CONNECTION_NAME" \
            --vpc-connector "$_VPC_CONNECTOR" \
            --vpc-egress "$_VPC_EGRESS" \
            --set-env-vars "DB_SOCKET_PATH=$_DB_SOCKET_PATH" \
            --memory 512Mi \
            --cpu 1 \
            --max-retries 0 \
            --task-timeout 300s \
            --command npm \
            --args run,db:migrate
        else
          gcloud run jobs create "$_MIGRATION_JOB" \
            --region "$_REGION" \
            --image "$$IMAGE_URI" \
            --service-account "$$SERVICE_ACCOUNT" \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --add-cloudsql-instances "$_CLOUDSQL_CONNECTION_NAME" \
            --vpc-connector "$_VPC_CONNECTOR" \
            --vpc-egress "$_VPC_EGRESS" \
            --set-env-vars "DB_SOCKET_PATH=$_DB_SOCKET_PATH" \
            --memory 512Mi \
            --cpu 1 \
            --max-retries 0 \
            --task-timeout 300s \
            --command npm \
            --args run,db:migrate
        fi

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: run-migrations
    entrypoint: bash
    args:
      - -ceu
      - |
        gcloud run jobs execute "$_MIGRATION_JOB" \
          --region "$_REGION" \
          --wait

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: deploy
    entrypoint: bash
    args:
      - -ceu
      - |
        source /workspace/deploy.env
        SERVICE_ACCOUNT="fondeu-app-runner@$PROJECT_ID.iam.gserviceaccount.com"

        gcloud run deploy "$_SERVICE" \
          --image "$$IMAGE_URI" \
          --region "$_REGION" \
          --platform managed \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --min-instances 1 \
          --max-instances 20 \
          --concurrency 80 \
          --add-cloudsql-instances "$_CLOUDSQL_CONNECTION_NAME" \
          --vpc-connector "$_VPC_CONNECTOR" \
          --vpc-egress "$_VPC_EGRESS" \
          --service-account "$$SERVICE_ACCOUNT" \
          --set-env-vars "^|^APP_VERSION=$COMMIT_SHA|GITHUB_SHA=$COMMIT_SHA|GCS_BUCKET=$_GCS_BUCKET|GCS_PROJECT_ID=$PROJECT_ID|GCS_KEY_FILENAME=$_GCS_KEY_FILENAME|STORAGE_STRICT_GCS=true|VECTOR_PROVIDER=qdrant|QDRANT_URL=$_QDRANT_URL|NODE_ENV=production|NEXT_PUBLIC_APP_URL=$_PRODUCTION_URL|NEXTAUTH_URL=$_PRODUCTION_URL|DB_SOCKET_PATH=$_DB_SOCKET_PATH|DB_NAME=$_DB_NAME|DB_USER=$_DB_USER|ALLOW_PASSWORD_LOGIN=$_ALLOW_PASSWORD_LOGIN|AUTH_ALLOWED_EMAILS=$_AUTH_ALLOWED_EMAILS|MANAGED_RUNTIME_ENABLED=$_MANAGED_RUNTIME_ENABLED|SCHEDULER_OIDC_AUDIENCE=$_SCHEDULER_OIDC_AUDIENCE" \
          --update-secrets "DATABASE_URL=${_DATABASE_URL_SECRET_NAME}:latest,NEXTAUTH_SECRET=${_NEXTAUTH_SECRET_NAME}:latest,REDIS_URL=${_REDIS_URL_SECRET_NAME}:latest,SENTRY_DSN=${_SENTRY_DSN_SECRET_NAME}:latest,QDRANT_API_KEY=${_QDRANT_API_KEY_SECRET_NAME}:latest,SMTP_PASS=${_SMTP_PASS_SECRET_NAME}:latest,DB_PASS=${_DB_PASS_SECRET_NAME}:latest,OPENAI_API_KEY=${_OPENAI_API_KEY_SECRET_NAME}:latest,ANTHROPIC_API_KEY=${_ANTHROPIC_API_KEY_SECRET_NAME}:latest,PERPLEXITY_API_KEY=${_PERPLEXITY_API_KEY_SECRET_NAME}:latest,GOOGLE_AI_API_KEY=${_GOOGLE_AI_API_KEY_SECRET_NAME}:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${_STRIPE_PUBLISHABLE_SECRET_NAME}:latest,STRIPE_SECRET_KEY=${_STRIPE_SECRET_KEY_SECRET_NAME}:latest,STRIPE_WEBHOOK_SECRET=${_STRIPE_WEBHOOK_SECRET_NAME}:latest,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID_SECRET_NAME}:latest,GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET_SECRET_NAME}:latest"

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: verify-production
    entrypoint: bash
    args:
      - -ceu
      - |
        PROD_URL="${_PRODUCTION_URL:-$$(gcloud run services describe "$_SERVICE" --region "$_REGION" --format='value(status.url)')}"
        if [ -z "$$PROD_URL" ]; then
          echo "Missing production URL"
          exit 1
        fi

        HEALTH_HEADER=()
        if [ -n "$_HEALTHCHECK_SECRET_NAME" ] && gcloud secrets describe "$_HEALTHCHECK_SECRET_NAME" >/dev/null 2>&1; then
          HEALTH_TOKEN=$$(gcloud secrets versions access latest --secret "$_HEALTHCHECK_SECRET_NAME")
          HEALTH_HEADER=(-H "Authorization: Bearer $$HEALTH_TOKEN")
        fi

        for i in $$(seq 1 15); do
          HEALTH_JSON=$$(curl -sf "$${HEALTH_HEADER[@]}" "$$PROD_URL/api/health" || true)
          STATUS=$$(python3 -c 'import json,sys; data=(json.load(sys.stdin) if sys.stdin.readable() else {}); print(data.get("status","unreachable"))' <<<"$$HEALTH_JSON" 2>/dev/null || echo "unreachable")
          STORAGE=$$(python3 -c 'import json,sys; data=(json.load(sys.stdin) if sys.stdin.readable() else {}); print(data.get("services",{}).get("storage","missing"))' <<<"$$HEALTH_JSON" 2>/dev/null || echo "missing")
          SENTRY=$$(python3 -c 'import json,sys; data=(json.load(sys.stdin) if sys.stdin.readable() else {}); print(data.get("services",{}).get("sentry","missing"))' <<<"$$HEALTH_JSON" 2>/dev/null || echo "missing")
          if [ -n "$_HEALTHCHECK_SECRET_NAME" ] && [ "$${#HEALTH_HEADER[@]}" -gt 0 ]; then
            HEALTHY=$$([ "$$STATUS" = "healthy" ] && [ "$$STORAGE" != "error" ] && [ "$$SENTRY" != "error" ] && echo yes || echo no)
          else
            HEALTHY=$$([ "$$STATUS" = "healthy" ] && echo yes || echo no)
          fi
          if [ "$$HEALTHY" = "yes" ]; then
            echo "Production healthy"
            exit 0
          fi
          echo "Attempt $$i: status=$$STATUS storage=$$STORAGE sentry=$$SENTRY"
          sleep 20
        done

        echo "Production health check failed"
        exit 1

options:
  machineType: E2_HIGHCPU_8
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY

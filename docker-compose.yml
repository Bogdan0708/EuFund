services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.docker
    environment:
      POSTGRES_INITDB_ARGS: '--locale=ro_RO.utf8'
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/src/lib/db/rls.sql:/docker-entrypoint-initdb.d/02-rls.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fondeu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    image: eu-funds:latest
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - '3001:3000'
    env_file: .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
    command: npm run dev

volumes:
  pgdata:
  qdrant_data:

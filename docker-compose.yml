version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fondeu
      POSTGRES_USER: fondeu
      POSTGRES_PASSWORD: fondeu_dev_2026
      POSTGRES_INITDB_ARGS: '--locale=ro_RO.utf8'
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/src/lib/db/rls.sql:/docker-entrypoint-initdb.d/02-rls.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fondeu']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://fondeu:fondeu_dev_2026@postgres:5432/fondeu
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-change-in-production-32chars!
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
    command: npm run dev

volumes:
  pgdata:

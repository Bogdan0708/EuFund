version: 2
updates:
  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    target-branch: main
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies
      - security
      - automerge

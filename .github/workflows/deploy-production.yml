name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest main)"
        required: false
        default: ""
      rollback:
        description: "Rollback to previous version"
        type: boolean
        default: false

env:
  REGION: europe-west2
  CLOUD_RUN_SERVICE: fondeu-platform

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval gate
        run: echo "Production deployment approved"

  deploy:
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Snapshot current serving revision
        if: ${{ inputs.rollback != true }}
        id: current
        run: |
          CURRENT_REVISION=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --format="value(status.traffic[0].revisionName)")
          echo "revision=$CURRENT_REVISION" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        if: ${{ inputs.rollback != true }}
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fondeu/platform:${IMAGE_TAG}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --update-secrets DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest,REDIS_URL=REDIS_URL:latest

      - name: Rollback to previous serving revision
        if: ${{ inputs.rollback == true }}
        run: |
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --sort-by="~metadata.creationTimestamp" \
            --format="value(metadata.name)" | sed -n '2p')

          if [ -z "$PREVIOUS_REVISION" ]; then
            echo "No previous revision found for rollback."
            exit 1
          fi

          gcloud run services update-traffic "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --to-revisions "${PREVIOUS_REVISION}=100"

      - name: Verify service is ready
        run: |
          gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --format="value(status.url)"
        timeout-minutes: 15

      - name: Production health check
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL }}"
          for i in {1..15}; do
            STATUS=$(curl -sf "$PROD_URL/api/health" | jq -r '.status' || echo "unreachable")
            if [ "$STATUS" == "healthy" ]; then
              echo "Production healthy!"
              exit 0
            fi
            echo "Attempt $i: $STATUS"
            sleep 20
          done
          echo "Production health check failed - consider rollback"
          exit 1

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest main)"
        required: false
        default: ""
      rollback:
        description: "Rollback to previous version"
        type: boolean
        default: false

env:
  REGION: europe-west2
  CLOUD_RUN_SERVICE: fondeu-platform
  MIGRATION_JOB: fondeu-db-migrate

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval gate
        run: echo "Production deployment approved"

  deploy:
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Snapshot current serving revision
        if: ${{ inputs.rollback != true }}
        id: current
        run: |
          CURRENT_REVISION=$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --format="value(status.traffic[0].revisionName)")
          echo "revision=$CURRENT_REVISION" >> "$GITHUB_OUTPUT"

      - name: Pre-deployment database backup
        if: ${{ inputs.rollback != true }}
        run: |
          gcloud sql backups create \
            --instance="${{ secrets.CLOUD_SQL_INSTANCE }}" \
            --description="pre-deploy-${{ github.sha }}" \
            --async

      - name: Configure database migration job
        if: ${{ inputs.rollback != true }}
        run: |
          if gcloud run jobs describe "$MIGRATION_JOB" --region "$REGION" >/dev/null 2>&1; then
            gcloud run jobs update "$MIGRATION_JOB" \
              --region "$REGION" \
              --image "europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fondeu/platform:${{ steps.image.outputs.tag }}" \
              --service-account "fondeu-app-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
              --set-secrets DATABASE_URL=DATABASE_URL:latest \
              --memory 512Mi \
              --cpu 1 \
              --max-retries 0 \
              --task-timeout 300s \
              --command "npx" \
              --args "drizzle-kit,migrate"
          else
            gcloud run jobs create "$MIGRATION_JOB" \
              --region "$REGION" \
              --image "europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fondeu/platform:${{ steps.image.outputs.tag }}" \
              --service-account "fondeu-app-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
              --set-secrets DATABASE_URL=DATABASE_URL:latest \
              --memory 512Mi \
              --cpu 1 \
              --max-retries 0 \
              --task-timeout 300s \
              --command "npx" \
              --args "drizzle-kit,migrate"
          fi

      - name: Run database migrations
        if: ${{ inputs.rollback != true }}
        run: |
          gcloud run jobs execute "$MIGRATION_JOB" \
            --region "$REGION" \
            --wait

      - name: Deploy to Cloud Run
        if: ${{ inputs.rollback != true }}
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "europe-west2-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fondeu/platform:${IMAGE_TAG}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 20 \
            --concurrency 80 \
            --service-account "fondeu-app-runner@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-env-vars APP_VERSION=${IMAGE_TAG},GITHUB_SHA=${{ github.sha }},GCS_BUCKET=${{ vars.GCS_BUCKET }},GCS_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCS_KEY_FILENAME=${{ vars.GCS_KEY_FILENAME }},STORAGE_STRICT_GCS=true,VECTOR_PROVIDER=qdrant,QDRANT_URL=${{ vars.QDRANT_URL }},AI_GATEWAY_URL=${{ vars.AI_GATEWAY_URL }},NODE_ENV=production,NEXT_PUBLIC_APP_URL=${{ vars.PRODUCTION_URL }},NEXTAUTH_URL=${{ vars.PRODUCTION_URL }},DB_SOCKET_PATH=${{ vars.DB_SOCKET_PATH }},DB_NAME=${{ vars.DB_NAME }},DB_USER=${{ vars.DB_USER }} \
            --update-secrets DATABASE_URL=DATABASE_URL:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest,REDIS_URL=REDIS_URL:latest,SENTRY_DSN=SENTRY_DSN:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,SMTP_PASS=SMTP_PASS:latest,DB_PASS=DB_PASS:latest,AI_GATEWAY_API_KEY=AI_GATEWAY_API_KEY:latest,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,HEALTHCHECK_AUTH_TOKEN=HEALTHCHECK_AUTH_TOKEN:latest

      - name: Rollback to previous serving revision
        if: ${{ inputs.rollback == true }}
        run: |
          PREVIOUS_REVISION=$(gcloud run revisions list \
            --service "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --sort-by="~metadata.creationTimestamp" \
            --format="value(metadata.name)" | sed -n '2p')

          if [ -z "$PREVIOUS_REVISION" ]; then
            echo "No previous revision found for rollback."
            exit 1
          fi

          gcloud run services update-traffic "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --to-revisions "${PREVIOUS_REVISION}=100"

      - name: Verify service is ready
        run: |
          gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --region "$REGION" \
            --format="value(status.url)"
        timeout-minutes: 15

      - name: Verify AI gateway dependency
        if: ${{ inputs.rollback != true }}
        env:
          AI_GATEWAY_URL: ${{ vars.AI_GATEWAY_URL }}
        run: |
          if [ -z "$AI_GATEWAY_URL" ]; then
            echo "AI_GATEWAY_URL GitHub variable is required for production deploy validation"
            exit 1
          fi

          GATEWAY_KEY=$(gcloud secrets versions access latest --secret=AI_GATEWAY_API_KEY)
          if [ -z "$GATEWAY_KEY" ]; then
            echo "Failed to load AI gateway API key from Secret Manager"
            exit 1
          fi

          curl -sf "$AI_GATEWAY_URL/health" | jq -e '.status == "healthy"'
          curl -sf -H "Authorization: Bearer $GATEWAY_KEY" "$AI_GATEWAY_URL/ready" | jq -e '.status == "ready"'

      - name: Production health check
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL }}"
          HEALTH_TOKEN=$(gcloud secrets versions access latest --secret=HEALTHCHECK_AUTH_TOKEN)
          if [ -z "$HEALTH_TOKEN" ]; then
            echo "Failed to load health check token from Secret Manager"
            exit 1
          fi

          for i in {1..15}; do
            HEALTH_JSON=$(curl -sf -H "Authorization: Bearer $HEALTH_TOKEN" "$PROD_URL/api/health" || true)
            STATUS=$(printf '%s' "$HEALTH_JSON" | jq -r '.status // "unreachable"' 2>/dev/null || echo "unreachable")
            STORAGE=$(printf '%s' "$HEALTH_JSON" | jq -r '.services.storage // "missing"' 2>/dev/null || echo "missing")
            SENTRY=$(printf '%s' "$HEALTH_JSON" | jq -r '.services.sentry // "missing"' 2>/dev/null || echo "missing")
            if [ "$STATUS" == "healthy" ] && [ "$STORAGE" != "error" ] && [ "$SENTRY" != "error" ]; then
              echo "Production healthy!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS storage=$STORAGE sentry=$SENTRY"
            sleep 20
          done
          echo "Production health check failed - consider rollback"
          exit 1

name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest main)"
        required: false
        default: ""
      rollback:
        description: "Rollback to previous version"
        type: boolean
        default: false

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: eu-funds-app
  ECS_CLUSTER: eu-funds-production
  ECS_SERVICE: eu-funds-app-production

permissions:
  id-token: write
  contents: read

jobs:
  approve:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval gate
        run: echo "Production deployment approved"

  deploy:
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: image
        run: |
          if [ "${{ inputs.rollback }}" == "true" ]; then
            TAG=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[0].deployments[1].taskDefinition' --output text | xargs aws ecs describe-task-definition --task-definition | jq -r '.taskDefinition.containerDefinitions[0].image' | cut -d: -f2)
          elif [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Pre-deployment backup
        run: |
          aws rds create-db-cluster-snapshot \
            --db-cluster-identifier eu-funds-db \
            --db-cluster-snapshot-identifier "pre-deploy-$(date +%s)" || true

      - name: Deploy to ECS (Blue-Green)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment

      - name: Wait for stable deployment
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE
        timeout-minutes: 15

      - name: Production health check
        run: |
          PROD_URL="${{ vars.PRODUCTION_URL }}"
          for i in {1..15}; do
            STATUS=$(curl -sf "$PROD_URL/api/health" | jq -r '.status' || echo "unreachable")
            if [ "$STATUS" == "healthy" ]; then
              echo "Production healthy!"
              exit 0
            fi
            echo "Attempt $i: $STATUS"
            sleep 20
          done
          echo "Production health check failed - consider rollback"
          exit 1

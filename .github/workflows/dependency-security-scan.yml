name: Dependency Security Scan

on:
  # Run on every push to main and pull requests
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  
  # Run weekly on Mondays at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  
  # Allow manual triggering
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  npm-audit:
    name: NPM Audit Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci --production=false

      - name: Run npm audit (production only)
        id: audit-prod
        working-directory: ./app
        continue-on-error: true
        run: |
          echo "## Production Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --production --json > audit-prod.json || true
          npm audit --production >> $GITHUB_STEP_SUMMARY || true
          
      - name: Run npm audit (all dependencies)
        id: audit-all
        working-directory: ./app
        continue-on-error: true
        run: |
          echo "## All Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-all.json || true
          npm audit >> $GITHUB_STEP_SUMMARY || true

      - name: Generate detailed vulnerability report
        working-directory: ./app
        run: |
          echo "# Security Vulnerability Report" > ../security-report.md
          echo "Generated: $(date)" >> ../security-report.md
          echo "" >> ../security-report.md
          
          echo "## Production Dependencies" >> ../security-report.md
          npm audit --production || echo "No production vulnerabilities found" >> ../security-report.md
          echo "" >> ../security-report.md
          
          echo "## Development Dependencies" >> ../security-report.md
          npm audit || echo "No dev vulnerabilities found" >> ../security-report.md
          echo "" >> ../security-report.md
          
          echo "## Outdated Packages" >> ../security-report.md
          npm outdated || echo "All packages up to date" >> ../security-report.md

      - name: Upload vulnerability reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            app/audit-prod.json
            app/audit-all.json
            security-report.md
          retention-days: 90

      - name: Check for critical vulnerabilities
        working-directory: ./app
        run: |
          # Fail the workflow if critical or high vulnerabilities in production deps
          CRITICAL=$(npm audit --production --json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(npm audit --production --json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "Critical vulnerabilities: $CRITICAL"
          echo "High vulnerabilities: $HIGH"
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "❌ Found critical or high severity vulnerabilities in production dependencies!"
            echo "Please review and fix these issues before merging."
            exit 1
          fi
          
          echo "✅ No critical or high severity vulnerabilities found in production dependencies"

      - name: Create issue for vulnerabilities (scheduled runs only)
        if: github.event_name == 'schedule' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('security-report.md', 'utf8');
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Security vulnerabilities detected - ${new Date().toISOString().split('T')[0]}`,
              body: `# Automated Security Scan Alert\n\n${report}\n\n**Action Required**: Please review and address these vulnerabilities.\n\nTriggered by: Weekly scheduled scan`,
              labels: ['security', 'dependencies', 'automated']
            });

  dependency-review:
    name: Dependency Review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Install license checker
        run: npm install -g license-checker

      - name: Check licenses
        working-directory: ./app
        run: |
          echo "# License Report" > ../license-report.md
          license-checker --production --json > licenses.json
          license-checker --production --summary >> ../license-report.md

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: license-report.md
          retention-days: 30

name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (PR)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high+critical fail)
        run: npm audit --audit-level=high

  trivy-container-scan:
    name: Trivy container scan (high+critical fail)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build application image
        run: docker build -f app/Dockerfile -t eu-funds-security-scan:${{ github.sha }} app

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: eu-funds-security-scan:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

  owasp-zap-dast:
    name: OWASP ZAP DAST (if DAST_TARGET_URL configured)
    runs-on: ubuntu-latest
    if: ${{ vars.DAST_TARGET_URL != '' }}
    steps:
      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ vars.DAST_TARGET_URL }}
          fail_action: true

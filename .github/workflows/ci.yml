name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  security-gates:
    runs-on: ubuntu-latest
    needs: quality

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security & critical flows tests
        run: npm test -- tests/integration/security.test.ts tests/integration/critical-flows.test.ts

  admin-storage-gates:
    runs-on: ubuntu-latest
    needs: quality

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Admin authorization tests
        run: npm test -- tests/integration/admin-programs-route.test.ts tests/integration/admin-calls-route.test.ts tests/integration/feature-flags.test.ts

      - name: Storage safety tests
        run: npm test -- tests/integration/document-upload-validation.test.ts tests/integration/document-delete-storage-cleanup.test.ts tests/integration/document-download-signed-url.test.ts

  rls-postgres-check:
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ vars.HAS_RLS_DATABASE == 'true' }}

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: RLS PostgreSQL enforcement check
        env:
          RLS_TEST_DATABASE_URL: ${{ secrets.RLS_TEST_DATABASE_URL }}
        run: npm test -- tests/integration/rls-postgres-enforcement.test.ts

  build-and-test:
    runs-on: ubuntu-latest
    needs: [quality, security-gates, admin-storage-gates]

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fondeu
          POSTGRES_USER: fondeu
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fondeu"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Push DB schema
        env:
          DATABASE_URL: postgresql://fondeu:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/fondeu
        run: npx drizzle-kit push

      - name: Seed admin user
        env:
          DATABASE_URL: postgresql://fondeu:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/fondeu
          ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
        run: npx tsx scripts/seed-admin.ts

      - name: Flush Redis rate limits
        run: redis-cli -h localhost -p 6379 FLUSHDB 2>/dev/null || docker exec "$(docker ps -qf ancestor=redis:7-alpine)" redis-cli FLUSHDB 2>/dev/null || true

      - name: Run Playwright E2E tests
        env:
          CI: true
          NODE_ENV: development
          DATABASE_URL: postgresql://fondeu:${{ secrets.CI_POSTGRES_PASSWORD }}@localhost:5432/fondeu
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-test-secret-not-for-production
          VECTOR_PROVIDER: memory
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}
        run: |
          PORT=3000 npm run dev &
          for i in $(seq 1 60); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            sleep 1
          done
          curl -sf http://localhost:3000/api/health || (echo "App failed to start" && exit 1)
          npx playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: app/test-results/
          retention-days: 7

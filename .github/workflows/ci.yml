name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

  security-gates:
    runs-on: ubuntu-latest
    needs: quality

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security & critical flows tests
        run: npm test -- tests/integration/security.test.ts tests/integration/critical-flows.test.ts

  admin-storage-gates:
    runs-on: ubuntu-latest
    needs: quality

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Admin authorization tests
        run: npm test -- tests/integration/admin-programs-route.test.ts tests/integration/admin-calls-route.test.ts tests/integration/feature-flags.test.ts

      - name: Storage safety tests
        run: npm test -- tests/integration/document-upload-validation.test.ts tests/integration/document-delete-storage-cleanup.test.ts tests/integration/document-download-signed-url.test.ts

  rls-postgres-check:
    runs-on: ubuntu-latest
    needs: quality
    if: ${{ vars.HAS_RLS_DATABASE == 'true' }}

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: RLS PostgreSQL enforcement check
        env:
          RLS_TEST_DATABASE_URL: ${{ secrets.RLS_TEST_DATABASE_URL }}
        run: npm test -- tests/integration/rls-postgres-enforcement.test.ts

  build-and-test:
    runs-on: ubuntu-latest
    needs: [quality, security-gates, admin-storage-gates]

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

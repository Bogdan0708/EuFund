name: Compliance Review

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  dpia-review-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate DPIA review state
        run: node scripts/compliance/check-dpia-review.mjs

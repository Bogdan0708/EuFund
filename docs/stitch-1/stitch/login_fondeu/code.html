        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .deep-field {
            background: #0e0e13;
            border: 1px solid rgba(140, 144, 159, 0.1);
        }
        .deep-field:focus-within {

<body class="bg-[#06060A] text-on-surface font-body min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Ambient Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-secondary/5 blur-[100px] rounded-full"></div>
<main class="w-full max-w-md px-6 relative z-10">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-14 h-14 bg-primary-container rounded-2xl flex items-center justify-center mb-4 shadow-[0_0_30px_rgba(77,142,255,0.3)]">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">FondEU</h1>
<p class="font-mono text-xs text-on-surface-variant/55 mt-1 uppercase tracking-widest">Intelligence Layer</p>
</div>
<!-- Login Card -->
<div class="liquid-glass rounded-2xl p-8 shadow-2xl">
<header class="mb-8">
<h2 class="font-headline text-xl text-on-surface">Autentificare</h2>
<p class="text-sm text-on-surface-variant/55 italic">Sign In</p>
</header>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-medium px-1">
                        Email <span class="text-xs text-on-surface-variant/55 italic ml-1">(Address)</span>
</label>
<div class="deep-field rounded-[10px] flex items-center px-4 py-3.5 transition-all duration-300">
<span class="material-symbols-outlined text-outline mr-3 text-xl" data-icon="mail">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-mono placeholder:text-outline/40 text-sm" placeholder="nume@companie.ro" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end px-1">
<label class="block text-sm font-medium">
                            Parolă <span class="text-xs text-on-surface-variant/55 italic ml-1">(Password)</span>
</label>
<a class="text-xs text-primary hover:text-primary-fixed transition-colors" href="#">Ați uitat parola?</a>
</div>
<div class="deep-field rounded-[10px] flex items-center px-4 py-3.5 transition-all duration-300">
<span class="material-symbols-outlined text-outline mr-3 text-xl" data-icon="lock">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full text-on-surface font-mono placeholder:text-outline/40 text-sm" placeholder="••••••••" type="password"/>
<button class="text-outline hover:text-on-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container hover:bg-primary text-on-primary-container font-headline font-bold py-4 rounded-xl transition-all duration-300 shadow-[0_4px_20px_rgba(77,142,255,0.2)] active:scale-[0.98]" type="submit">
                    Autentificare
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-white/5"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-[#1b1b20] px-3 text-outline/60 font-mono">SAU / OR</span>
</div>
</div>
<!-- OAuth Button -->
<button class="w-full liquid-glass hover:bg-white/10 text-on-surface font-medium py-3.5 rounded-xl transition-all duration-300 flex items-center justify-center gap-3">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google multi-colored G logo icon on a white background with clean sharp edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhGuC6EDYCoHWhSrCZR6bXEKs1t1f2jox2Aeilm3iQGVVXdeeITANRcXOVFtrhgDdLuevNgXVE5_6D9BzaBhmgyrN9a9chKOuE4_F0R7kmzuF63eF4kUR7mqLrcbut55oIZPPVCPce0nKStVV_INUhdN1pVNVUN1_uqiTKCLzXr0g_mpdEouA5TnCdGa-Kw_dpsa5QnuX04rl49I2QYKXGaECKyssH88fhK2LcuSBm5HneQdeEllppcCBqO47t6xWHQAcnYp9BkMjn"/>
<span class="text-sm">Conectare cu Google</span>
</button>
</div>
<!-- Footer Links -->
<footer class="mt-8 text-center">
<p class="text-sm text-on-surface-variant/70">
                Nu aveți un cont? 
                <a class="text-primary font-semibold hover:underline ml-1" href="#">Creați un cont</a>
</p>
<p class="text-[10px] text-on-surface-variant/30 mt-6 uppercase tracking-widest font-mono">
                FondEU Security Protocol v4.2.0
            </p>
</footer>
</main>
<!-- Decorative Bottom Gradient -->
<div class="absolute bottom-0 left-0 w-full h-[300px] bg-gradient-to-t from-primary/5 to-transparent pointer-events-none"></div>
</body></html>

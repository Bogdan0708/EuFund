<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FondEU | The Digital Curator - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#00637f",
              "outline": "#717785",
              "surface-container-high": "#e9e7ed",
              "tertiary-fixed": "#bee9ff",
              "on-surface-variant": "#414753",
              "tertiary-container": "#007da1",
              "surface-container-lowest": "#ffffff",
              "primary-fixed-dim": "#abc7ff",
              "surface-bright": "#faf8fe",
              "tertiary-fixed-dim": "#68d3ff",
              "surface-container": "#eeedf3",
              "primary-fixed": "#d7e2ff",
              "inverse-primary": "#abc7ff",
              "inverse-surface": "#2f3034",
              "on-error": "#ffffff",
              "on-background": "#1a1b1f",
              "surface-container-highest": "#e3e2e7",
              "on-tertiary-container": "#f7fbff",
              "on-primary": "#ffffff",
              "secondary-fixed": "#e2dfff",
              "on-tertiary-fixed-variant": "#004d64",
              "secondary": "#4a47d2",
              "primary": "#0059b5",
              "background": "#faf8fe",
              "on-surface": "#1a1b1f",
              "on-primary-container": "#fcfbff",
              "primary-container": "#0071e3",
              "error-container": "#ffdad6",
              "on-tertiary-fixed": "#001f2a",
              "on-primary-fixed": "#001b3f",
              "surface-tint": "#005cbb",
              "on-secondary-fixed": "#0c006b",
              "on-secondary-fixed-variant": "#332dbc",
              "secondary-fixed-dim": "#c2c1ff",
              "on-secondary": "#ffffff",
              "surface-variant": "#e3e2e7",
              "on-primary-fixed-variant": "#00458f",
              "on-error-container": "#93000a",
              "error": "#ba1a1a",
              "surface-container-low": "#f4f3f8",
              "on-tertiary": "#ffffff",
              "inverse-on-surface": "#f1f0f5",
              "on-secondary-container": "#fffbff",
              "surface": "#faf8fe",
              "surface-dim": "#dad9df",
              "secondary-container": "#6462ec",
              "outline-variant": "#c1c6d6"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .mesh-background {
        background-color: #faf8fe;
        background-image: 
          radial-gradient(at 0% 0%, rgba(0, 113, 227, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(74, 71, 210, 0.15) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 113, 227, 0.1) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(74, 71, 210, 0.1) 0px, transparent 50%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
</head>
<body class="font-body bg-background text-on-surface selection:bg-primary/20">
<!-- Main Content Wrapper -->
<main class="min-h-screen flex items-center justify-center p-6 mesh-background">
<!-- Login Container -->
<div class="w-full max-w-[480px] fade-in-up">
<!-- Branding Header (Outside card for editorial authority) -->
<div class="text-center mb-12">
<h1 class="text-5xl font-extrabold tracking-tighter text-on-surface mb-2">FondEU</h1>
<p class="text-on-surface-variant text-lg font-medium tracking-tight">The Digital Curator</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-card rounded-lg p-10 md:p-14 border border-white/20 shadow-[0_20px_40px_rgba(0,0,0,0.04)]">
<!-- Sign In Form -->
<form action="#" class="space-y-8" method="POST">
<div class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email</label>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all duration-300 placeholder:text-outline/50 text-on-surface outline-none" id="email" name="email" placeholder="name@organization.eu" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="password">Password</label>
</div>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all duration-300 placeholder:text-outline/50 text-on-surface outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-4 space-y-6">
<button class="w-full py-4 bg-primary-container text-white font-bold rounded-full hover:translate-y-[-1px] transition-all duration-250 active:scale-[0.98] text-lg" type="submit">
                            Sign In
                        </button>
<div class="flex flex-col items-center space-y-4">
<a class="text-sm font-semibold text-primary hover:opacity-80 transition-opacity" href="#">Forgot password?</a>
<div class="pt-4 border-t border-outline-variant/15 w-full text-center">
<p class="text-sm text-on-surface-variant">
                                    New to FondEU? 
                                    <a class="text-primary font-bold ml-1 hover:opacity-80 transition-opacity" href="#register">Create an account</a>
</p>
</div>
</div>
</div>
</form>
</div>
<!-- Footer Meta -->
<div class="mt-12 text-center text-xs text-outline font-medium tracking-tight">
<p>© 2024 FondEU. All rights reserved. <br/> Powered by Advanced AI Curator Systems.</p>
</div>
</div>
</main>
<!-- Background Decorative Gradient Blob (Optional refinement from design system) -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[120px] pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px] pointer-events-none z-0"></div>
<!-- Hidden Registration Section Template (For structural completeness) -->
<div class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 mesh-background overflow-y-auto" id="registration-overlay">
<div class="w-full max-w-[540px] py-12">
<div class="text-center mb-10">
<h1 class="text-4xl font-extrabold tracking-tighter text-on-surface mb-2">Join FondEU</h1>
<p class="text-on-surface-variant text-base font-medium">Start your grant discovery journey</p>
</div>
<div class="glass-card rounded-lg p-10 border border-white/20 shadow-2xl">
<form class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Full Name</label>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all outline-none" type="text"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Organization</label>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all outline-none" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Work Email</label>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all outline-none" type="email"/>
</div>
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Password</label>
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-2xl focus:ring-1 focus:ring-primary/20 focus:bg-white transition-all outline-none" type="password"/>
</div>
<button class="w-full py-4 bg-primary-container text-white font-bold rounded-full hover:translate-y-[-1px] transition-all text-lg mt-4" type="submit">
                        Create Account
                    </button>
<button class="w-full text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors text-center" type="button">
                        Already have an account? Sign In
                    </button>
</form>
</div>
</div>
</div>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | FondEU</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed": "#0c006b",
              "on-error-container": "#93000a",
              "surface": "#faf8fe",
              "on-secondary-fixed-variant": "#332dbc",
              "tertiary": "#00637f",
              "surface-container-highest": "#e3e2e7",
              "on-tertiary-container": "#f7fbff",
              "on-surface-variant": "#414753",
              "on-primary": "#ffffff",
              "primary": "#0059b5",
              "surface-container-high": "#e9e7ed",
              "surface-tint": "#005cbb",
              "on-background": "#1a1b1f",
              "tertiary-container": "#007da1",
              "outline-variant": "#c1c6d6",
              "primary-fixed-dim": "#abc7ff",
              "on-error": "#ffffff",
              "surface-container-low": "#f4f3f8",
              "on-primary-fixed-variant": "#00458f",
              "surface-dim": "#dad9df",
              "secondary-fixed-dim": "#c2c1ff",
              "primary-fixed": "#d7e2ff",
              "surface-variant": "#e3e2e7",
              "background": "#faf8fe",
              "secondary-fixed": "#e2dfff",
              "secondary": "#4a47d2",
              "inverse-primary": "#abc7ff",
              "on-surface": "#1a1b1f",
              "outline": "#717785",
              "on-secondary-container": "#fffbff",
              "on-secondary": "#ffffff",
              "tertiary-fixed-dim": "#68d3ff",
              "tertiary-fixed": "#bee9ff",
              "surface-bright": "#faf8fe",
              "inverse-surface": "#2f3034",
              "surface-container-lowest": "#ffffff",
              "error-container": "#ffdad6",
              "on-primary-fixed": "#001b3f",
              "primary-container": "#0071e3",
              "on-tertiary": "#ffffff",
              "error": "#ba1a1a",
              "surface-container": "#eeedf3",
              "secondary-container": "#6462ec",
              "inverse-on-surface": "#f1f0f5",
              "on-primary-container": "#fcfbff",
              "on-tertiary-fixed-variant": "#004d64",
              "on-tertiary-fixed": "#001f2a"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .mesh-gradient {
        background-color: #F5F5F7;
        background-image: 
          radial-gradient(at 0% 0%, rgba(0, 113, 227, 0.12) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(100, 98, 236, 0.12) 0px, transparent 50%),
          radial-gradient(at 100% 100%, rgba(0, 113, 227, 0.08) 0px, transparent 50%),
          radial-gradient(at 0% 100%, rgba(100, 98, 236, 0.08) 0px, transparent 50%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
      }
    </style>
</head>
<body class="font-body text-on-surface mesh-gradient min-h-screen flex flex-col items-center justify-center p-6 selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Top Glow Effect (Atmospheric) -->
<div class="fixed top-[-10%] left-[20%] w-[600px] h-[600px] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md z-10">
<!-- Login Card -->
<div class="glass-card rounded-lg p-10 shadow-[0_20px_40px_rgba(0,0,0,0.04)] border border-white/20">
<!-- Branding Header -->
<div class="text-center mb-10">
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface mb-2">FondEU</h1>
<p class="text-on-surface-variant font-medium text-sm tracking-wide">The Digital Curator</p>
</div>
<!-- Social Provider Stack -->
<div class="space-y-3 mb-8">
<button class="w-full flex items-center justify-start gap-4 px-6 py-4 bg-white hover:bg-surface-container-low transition-all duration-250 rounded-md border border-outline-variant/10 text-on-surface font-medium hover:-translate-y-[1px]">
<span class="material-symbols-outlined text-xl">google</span>
<span>Continue with Google</span>
</button>
<button class="w-full flex items-center justify-start gap-4 px-6 py-4 bg-white hover:bg-surface-container-low transition-all duration-250 rounded-md border border-outline-variant/10 text-on-surface font-medium hover:-translate-y-[1px]">
<span class="material-symbols-outlined text-xl">grid_view</span>
<span>Continue with Microsoft</span>
</button>
<button class="w-full flex items-center justify-start gap-4 px-6 py-4 bg-white hover:bg-surface-container-low transition-all duration-250 rounded-md border border-outline-variant/10 text-on-surface font-medium hover:-translate-y-[1px]">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">facebook</span>
<span>Continue with Facebook</span>
</button>
<button class="w-full flex items-center justify-start gap-4 px-6 py-4 bg-white hover:bg-surface-container-low transition-all duration-250 rounded-md border border-outline-variant/10 text-on-surface font-medium hover:-translate-y-[1px]">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">apple</span>
<span>Continue with Apple</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-6">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-xs font-semibold uppercase tracking-widest text-outline">or</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Magic Link Section -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface-variant px-1">Sign in with Magic Link</h2>
<div class="space-y-3">
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container-high/50 border-none rounded-md focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all duration-200 text-on-surface placeholder:text-outline outline-none" placeholder="Email address" type="email"/>
</div>
<button class="w-full py-4 bg-primary-container hover:bg-primary text-on-primary font-bold rounded-md transition-all duration-250 active:scale-[0.98] hover:-translate-y-[1px]">
                        Send Magic Link
                    </button>
<p class="text-[13px] text-on-surface-variant text-center leading-relaxed px-4">
                        We'll send you a secure sign-in link. No password needed.
                    </p>
</div>
</section>
</div>
<!-- Supplemental Aesthetic Background Element (Asymmetry) -->
<div class="absolute top-[60%] right-[-10%] w-[300px] h-[300px] bg-primary/5 rounded-full blur-[80px] pointer-events-none"></div>
</main>
<!-- Footer -->
<footer class="mt-16 text-center">
<div class="text-[13px] font-medium text-outline flex items-center justify-center gap-4">
<span>© 2026 FondEU.</span>
<div class="flex gap-4">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="text-outline/30">•</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
</div>
</footer>
</body></html>

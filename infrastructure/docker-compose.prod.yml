version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: eu-funds-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eufunds}
      POSTGRES_USER: ${POSTGRES_USER:-eufunds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eu-funds-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.prod
    container_name: eu-funds-app
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://eufunds:change-me@postgres:5432/eufunds}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://funduri-ue.example.ro}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: eu-funds-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:

networks:
  app_net:
    driver: bridge

apiVersion: apps/v1
kind: Deployment
metadata:
  name: eu-funds-app
  namespace: eu-funds
  labels:
    app: eu-funds
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eu-funds
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: eu-funds
        tier: frontend
    spec:
      serviceAccountName: eu-funds-app
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: app
          image: eu-funds-app:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: eu-funds-config
            - secretRef:
                name: eu-funds-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: eu-funds-app
  namespace: eu-funds
spec:
  selector:
    app: eu-funds
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eu-funds-ingress
  namespace: eu-funds
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "30"
    nginx.ingress.kubernetes.io/rate-limit-window: "1s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - funduri-ue.example.ro
      secretName: eu-funds-tls
  rules:
    - host: funduri-ue.example.ro
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: eu-funds-app
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: eu-funds-hpa
  namespace: eu-funds
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: eu-funds-app
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eu-funds-config
  namespace: eu-funds
data:
  NODE_ENV: "production"
  NEXTAUTH_URL: "https://funduri-ue.example.ro"
  NEXT_TELEMETRY_DISABLED: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: eu-funds-secrets
  namespace: eu-funds
type: Opaque
stringData:
  DATABASE_URL: "postgresql://user:pass@db:5432/eufunds"
  REDIS_URL: "redis://redis:6379/0"
  NEXTAUTH_SECRET: "change-me"
---
apiVersion: v1
kind: Namespace
metadata:
  name: eu-funds
  labels:
    name: eu-funds
